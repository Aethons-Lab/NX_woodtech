<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="plankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C68A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5E3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plankGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a3a20;stop-opacity:1" />
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="110" height="110" rx="16"/>
    </clipPath>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="5" width="110" height="110" rx="16" fill="#2A1D14"/>

  <!-- Wood plank layers — stylised W mark -->
  <!-- Plank 1 (left leg of W) -->
  <rect x="14" y="28" width="18" height="64" rx="4" fill="url(#plankGrad)" clip-path="url(#iconClip)"/>
  <!-- Plank 2 (inner left) -->
  <rect x="36" y="44" width="18" height="48" rx="4" fill="url(#plankGrad2)" clip-path="url(#iconClip)"/>
  <!-- Plank 3 (inner right) -->
  <rect x="58" y="44" width="18" height="48" rx="4" fill="url(#plankGrad2)" clip-path="url(#iconClip)"/>
  <!-- Plank 4 (right leg of W) -->
  <rect x="80" y="28" width="18" height="64" rx="4" fill="url(#plankGrad)" clip-path="url(#iconClip)"/>

  <!-- Gold top bar accent -->
  <rect x="14" y="22" width="84" height="6" rx="3" fill="#C68A3A" opacity="0.9" clip-path="url(#iconClip)"/>

  <!-- Grain lines on planks -->
  <line x1="14" y1="48" x2="32" y2="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="14" y1="60" x2="32" y2="60" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="14" y1="72" x2="32" y2="72" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <line x1="36" y1="58" x2="54" y2="58" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="36" y1="70" x2="54" y2="70" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="36" y1="82" x2="54" y2="82" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <line x1="58" y1="58" x2="76" y2="58" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="58" y1="70" x2="76" y2="70" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="58" y1="82" x2="76" y2="82" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <line x1="80" y1="48" x2="98" y2="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="98" y2="60" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="80" y1="72" x2="98" y2="72" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Wordmark -->
  <!-- WOODTECH -->
  <text
    x="128"
    y="58"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    letter-spacing="2"
    fill="#2A1D14"
  >WOODTECH</text>

  <!-- Divider line -->
  <rect x="128" y="68" width="340" height="2.5" rx="1.25" fill="#C68A3A"/>

  <!-- PLY INDUSTRIES -->
  <text
    x="130"
    y="92"
    font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="14"
    letter-spacing="7"
    fill="#8B5E3C"
  >PLY INDUSTRIES</text>
</svg>
